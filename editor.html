<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>写作台 · 我的笔记</title><link rel="stylesheet" href="styles.css?v=20260724-wps2">
</head>
<body class="editor-page private-blog" data-main="editor.js?v=20260724-wps2">
<section id="authGate" class="auth-gate" hidden>
  <div class="auth-card"><span class="auth-mark">私人写作台</span><h1>我的笔记</h1><p id="authMessage">使用你的GitHub账号登录后，才能编辑和同步文章。</p><button id="githubLogin" class="github-login">使用 GitHub 登录</button><small>只有账号 Dylan-hero 可以进入</small></div>
</section><div id="appShell" hidden>
<header class="top editor-top">
  <a class="brand" href="./">← 我的笔记</a>
  <label class="autosave-control" title="关闭后请使用保存按钮或 Ctrl+S">
    <span>自动保存</span><input id="autoSaveToggle" type="checkbox"><i></i>
  </label>
  <button id="saveBtn" class="save-button" title="保存（Ctrl+S）">▣ 保存</button>
  <div class="status" id="status">已保存</div>
  <div class="actions"><span class="cloud-user" data-cloud-user></span>
    <button id="exportBtn">导出备份</button>
    <label class="file-btn">导入备份<input id="importFile" type="file" accept=".json"></label>
    <button id="draftBtn" title="只保存草稿，不更新已发布内容">存入草稿箱</button><button id="unpublishBtn" hidden>取消发布</button><button class="button small" id="publishBtn">发布</button>
  </div>
</header>
<div class="workspace">
  <aside class="left-pane">
    <div class="pane-tabs"><button class="active" data-pane="notes">文章</button><button data-pane="outline">导航</button></div>
    <section id="notesPane">
      <div class="side-head"><strong>我的文章</strong><button id="newBtn" title="新建文章">＋</button></div>
      <input id="search" class="search" placeholder="搜索文章"><div id="noteList"></div>
    </section>
    <section id="outlinePane" hidden>
      <div class="outline-head"><strong>导航窗格</strong><span>按标题生成</span></div>
      <div id="outlineList" class="outline-list"></div>
    </section>
  </aside>
  <main class="desk">
    <input id="title" class="title-input" placeholder="无标题文章">
    <div class="ribbon" id="ribbon">
      <div class="ribbon-group history-group">
        <div class="ribbon-row"><button data-cmd="undo" title="撤销 Ctrl+Z">↶</button><button data-cmd="redo" title="重做 Ctrl+Y">↷</button></div>
        <span>历史</span>
      </div>
      <div class="ribbon-group font-group">
        <div class="ribbon-row">
          <select id="fontFamily" title="字体">
            <option value="Microsoft YaHei">微软雅黑</option><option value="SimSun">宋体</option>
            <option value="KaiTi">楷体</option><option value="SimHei">黑体</option>
            <option value="Arial">Arial</option><option value="Times New Roman">Times New Roman</option>
            <option value="Consolas">Consolas</option>
          </select>
          <select id="fontSize" title="字号">
            <option value="2">小五</option><option value="3" selected>五号</option><option value="4">小四</option>
            <option value="5">三号</option><option value="6">二号</option><option value="7">一号</option>
          </select>
        </div>
        <div class="ribbon-row">
          <button data-cmd="bold"><b>B</b></button><button data-cmd="italic"><em>I</em></button><button data-cmd="underline"><u>U</u></button>
          <label class="color-tool" title="字体颜色"><span>A</span><input id="textColor" type="color" value="#c00000"></label>
          <label class="color-tool highlight-tool" title="填充/突出显示颜色"><span>▰</span><input id="highlightColor" type="color" value="#fff200"></label>
          <button data-cmd="removeFormat" title="清除格式">Tx</button>
        </div>
        <span>字体</span>
      </div>
      <div class="ribbon-group paragraph-group">
        <div class="ribbon-row">
          <select id="blockFormat" title="标题级别"><option value="p">正文</option><option value="h1">标题 1</option><option value="h2">标题 2</option><option value="h3">标题 3</option><option value="h4">标题 4</option><option value="blockquote">引用</option></select>
          <select id="lineHeight" title="行距"><option value="1">单倍</option><option value="1.25">1.25 倍</option><option value="1.5" selected>1.5 倍</option><option value="1.75">1.75 倍</option><option value="2">2 倍</option><option value="2.5">2.5 倍</option></select>
        </div>
        <div class="ribbon-row">
          <button data-cmd="justifyLeft" title="左对齐">≡</button><button data-cmd="justifyCenter" title="居中">≡</button><button data-cmd="justifyRight" title="右对齐">≡</button><button data-cmd="justifyFull" title="两端对齐">☰</button>
          <button data-cmd="insertUnorderedList">• 列表</button><button data-cmd="insertOrderedList">1. 列表</button>
        </div>
        <span>段落</span>
      </div>
      <div class="ribbon-group insert-group">
        <div class="ribbon-row">
          <button id="tableBtn" aria-haspopup="true" aria-expanded="false">▦ 表格 ▾</button><button id="tocBtn">☷ 目录</button><button id="linkBtn">🔗 链接</button>
          <label class="image-btn">图片<input id="imageFile" type="file" accept="image/*" multiple></label>
        </div>
        <div class="ribbon-row table-actions">
          <button id="addRowBtn" title="在当前行后添加">＋行</button><button id="addColBtn" title="在当前列后添加">＋列</button>
          <button id="delRowBtn">－行</button><button id="delColBtn">－列</button><button id="delTableBtn">删表</button>
          <button id="tablePropsBtn" title="调整表格宽度、行高、边框和单元格格式">表格属性</button>
          <button id="clipboardBtn" title="检查 Word 提供给浏览器的数据">剪贴板检查</button>
        </div>
        <span>插入与表格</span>
      </div>
    </div>
    <div id="content" class="paper prose" contenteditable="true" data-placeholder="从这里开始写作，也可以直接粘贴普通图文……"></div>
    <div class="editor-foot"><span id="words">0 字</span><span class="hint">标题将自动出现在左侧导航窗格</span><button class="danger" id="deleteBtn">删除文章</button></div>
  </main>
</div>
<section id="tablePicker" class="table-picker" hidden>
  <div class="table-picker-head"><strong id="tablePickerLabel">1 行 × 1 列 表格</strong><button id="moreTableBtn" type="button">更多行列</button></div>
  <div id="tableGrid" class="table-grid" role="grid" aria-label="选择表格行列数"></div>
  <div class="table-theme">
    <span>主题颜色</span>
    <div id="tableThemeColors" class="table-theme-colors" aria-label="表格主题颜色"></div>
  </div>
</section>
<div id="tableTools" class="table-tools" hidden>
  <div id="tableSelectionFrame" class="table-selection-frame"></div>
  <button id="tableMoveHandle" class="table-move-handle" type="button" title="选择整张表格；双击打开表格属性">⠿</button>
  <button id="quickAddCol" class="table-quick-add table-quick-add-col" type="button" title="在右侧添加一列">＋</button>
  <button id="quickAddRow" class="table-quick-add table-quick-add-row" type="button" title="在下方添加一行">＋</button>
  <div id="tableResizeGuide" class="table-resize-guide"></div>
</div>
<dialog id="tableDialog" class="table-dialog">
  <button id="tableDialogClose" class="dialog-close" type="button" aria-label="关闭">×</button>
  <h2>表格属性</h2>
  <p class="table-dialog-tip">先把光标放进单元格。列宽和行高也可以在表格中直接拖动单元格的右边缘或下边缘。</p>
  <div class="table-form">
    <label>应用范围<select id="tableScope"><option value="cell">当前单元格</option><option value="row">当前行</option><option value="column">当前列</option><option value="table">整张表格</option></select></label>
    <label>自动调整<select id="tableAutoFit"><option value="fixed">固定列宽</option><option value="window">根据窗口调整</option><option value="content">根据内容调整</option></select></label>
    <label>表格宽度（%）<input id="tableWidth" type="number" min="20" max="200" step="5" value="100"></label>
    <label>当前列宽（px）<input id="columnWidth" type="number" min="40" max="800" step="5"></label>
    <label>行高（px）<input id="rowHeight" type="number" min="24" max="500" step="2"></label>
    <label>单元格上边距（px）<input id="cellPaddingTop" type="number" min="0" max="80" step="1"></label>
    <label>单元格下边距（px）<input id="cellPaddingBottom" type="number" min="0" max="80" step="1"></label>
    <label>单元格左边距（px）<input id="cellPaddingLeft" type="number" min="0" max="120" step="1"></label>
    <label>单元格右边距（px）<input id="cellPaddingRight" type="number" min="0" max="120" step="1"></label>
    <label>单元格间距（px）<input id="cellSpacing" type="number" min="0" max="30" step="1"></label>
    <label>单元格行距<select id="cellLineHeight"><option value="1">1.0</option><option value="1.15">1.15</option><option value="1.5">1.5</option><option value="1.75">1.75</option><option value="2">2.0</option><option value="2.5">2.5</option></select></label>
    <label>边框宽度（px）<input id="tableBorderWidth" type="number" min="0" max="12" step="1"></label>
    <label>边框颜色<input id="tableBorderColor" type="color" value="#565656"></label>
    <label>填充颜色<input id="tableFillColor" type="color" value="#ffffff"></label>
    <label>表格对齐<select id="tableAlign"><option value="left">左对齐</option><option value="center">居中</option><option value="right">右对齐</option></select></label>
    <label>水平对齐<select id="tableTextAlign"><option value="left">左对齐</option><option value="center">居中</option><option value="right">右对齐</option></select></label>
    <label>垂直对齐<select id="tableVerticalAlign"><option value="top">顶端</option><option value="middle">居中</option><option value="bottom">底端</option></select></label>
  </div>
  <div class="dialog-actions"><button id="tableResetBtn" type="button">恢复自适应</button><button id="tableApplyBtn" class="button" type="button">应用</button></div>
</dialog>
</div>
<script src="vendor/supabase.js"></script><script src="cloud-config.js"></script><script src="structure.js?v=20260724-wps1"></script><script src="cloud.js?v=20260724-fast1"></script>
</body></html>
